<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="styles.css">

<style>
    body {
        background: linear-gradient(to right, #d6f5e9, #ffffff, #ddf9ee);
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    header {
       background: linear-gradient(to right, #058354, #04AA6D, #058354);
        color: #ffffff;
        padding: 1rem;
        text-align: left;
    }
    button {
        background-color: #ffffff;
        color: #333;
        border: none;
        padding: 0.5rem 1rem;
        margin-left: 1rem;
        cursor: pointer;
        float: right;


    }

   
    main {
        padding: 2rem;
    }

    section {
        margin-bottom: 2rem;
    
    }

    footer {
        background: linear-gradient(to right, rgb(2, 72, 46), rgb(3, 81, 53), rgb(2, 72, 46)g);
        color: #fff;
        text-align: center;
        padding: 1rem;
        
    }




</style>
</head>
<body>
    <header>
        <h1>Welcome to Our Website</h1>
         <button><a href="/about" style="color: rgb(60, 43, 43); text-decoration: none;">About Us</a></button>
         <button><a href="/resources" style="color: rgb(60, 43, 43); text-decoration: none;">Resources</a></button>
         <button><a href="/notes" style="color: rgb(60, 43, 43); text-decoration: none;">Notes</a></button>
    </header>

    <main>
        <section>
            <h2>About Us</h2>
            <p>We are a company dedicated to providing excellent products and services.</p>
        </section>

        <section>
            <h2>Services</h2>
            <p>We offer a wide range of services to meet your needs.</p>
        </section>

    </main>

    <footer>
        <p>&copy; 2024 Our Company. All rights reserved.</p>
    </footer>
</body>
</html>
